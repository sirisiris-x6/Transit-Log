<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>탑승 기록 — Transit Log</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root{
  --navy:#0f1b2d;--navy2:#1a2f4a;--mint:#3ecfb2;--mint2:#2aab93;
  --cream:#f5f0e8;--cream2:#ebe5d9;--red:#e8503a;
  --text:#1a1a2e;--muted:#6b7280;--border:#d4cdc2;--radius:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}

/* HEADER */
header{background:var(--navy);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;background:var(--mint);border-radius:8px;display:grid;place-items:center;font-size:18px;}
.logo-text{font-family:'IBM Plex Mono',monospace;color:var(--cream);font-size:16px;font-weight:600;letter-spacing:.5px;}
.logo-text span{color:var(--mint);}
.header-right{display:flex;align-items:center;gap:12px;}
.record-count{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--mint);background:rgba(62,207,178,.12);border:1px solid rgba(62,207,178,.3);padding:4px 10px;border-radius:20px;}
.btn-add{background:var(--mint);color:var(--navy);border:none;border-radius:8px;padding:8px 16px;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:background .2s,transform .1s;}
.btn-add:hover{background:var(--mint2);transform:translateY(-1px);}

/* FILTER BAR */
.filter-bar{background:var(--navy2);padding:10px 20px;border-bottom:2px solid var(--mint);}
.filter-section{display:flex;align-items:center;flex-wrap:wrap;gap:6px;padding:5px 0;}
.filter-section+.filter-section{border-top:1px solid rgba(255,255,255,.1);margin-top:4px;padding-top:9px;}
.filter-group-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mint);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;min-width:52px;}
.filter-major{padding:4px 12px;border-radius:20px;border:1.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.08);color:rgba(255,255,255,.85);font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .18s;}
.filter-major:hover,.filter-major.active{background:var(--mint);border-color:var(--mint);color:var(--navy);}
.filter-minor{padding:3px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.55);font-family:'Noto Sans KR',sans-serif;font-size:11px;cursor:pointer;transition:all .18s;}
.filter-minor:hover,.filter-minor.active{background:rgba(62,207,178,.22);border-color:var(--mint);color:var(--mint);}
.filter-sep{width:1px;height:16px;background:rgba(255,255,255,.2);margin:0 4px;flex-shrink:0;}

/* SORT BAR */
.sort-bar{background:var(--cream2);padding:7px 24px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.sort-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.sort-btn{padding:4px 12px;border-radius:14px;border:1px solid var(--border);background:#fff;font-size:12px;font-family:'Noto Sans KR',sans-serif;color:var(--muted);cursor:pointer;transition:all .15s;}
.sort-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.sort-btn:hover:not(.active){background:var(--cream2);}

/* BOARD */
.board{padding:28px 24px 80px;columns:320px auto;column-gap:18px;}

/* CARD */
.card{break-inside:avoid;background:#fff;border-radius:var(--radius);margin-bottom:18px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden;transition:transform .2s,box-shadow .2s;border:1px solid var(--border);}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.14);}
.card-bar{height:5px;width:100%;}

/* 사진 */
.card-photos{display:flex;gap:4px;overflow-x:auto;background:#f0ece4;}
.card-photos img{height:180px;object-fit:cover;flex-shrink:0;cursor:pointer;transition:opacity .15s;}
.card-photos img:hover{opacity:.85;}
.card-photos.single img{width:100%;height:220px;}

/* 시간 타임라인 */
.time-bar{display:flex;align-items:center;padding:10px 16px 0;font-family:'IBM Plex Mono',monospace;gap:0;}
.time-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.time-dot.s{background:var(--mint2);box-shadow:0 0 0 2px rgba(42,171,147,.25);}
.time-dot.e{background:var(--red);box-shadow:0 0 0 2px rgba(232,80,58,.2);}
.time-line{flex:1;height:2px;background:linear-gradient(to right,var(--mint2),var(--red));margin:0 3px;}
.time-val{font-size:11px;color:var(--muted);}
.time-val.s{margin-right:4px;}
.time-val.e{margin-left:4px;}
.time-dur{font-size:10px;background:var(--navy);color:#fff;border-radius:10px;padding:1px 7px;margin:0 4px;white-space:nowrap;}

/* 구간 */
.segment-row{padding:4px 16px 8px;display:flex;align-items:center;gap:5px;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--muted);}
.seg-tag{background:var(--cream2);border-radius:4px;padding:1px 6px;color:var(--text);font-size:11px;}
.seg-arr{color:var(--mint2);font-weight:700;font-size:12px;}

.card-header{padding:12px 16px 8px;display:flex;align-items:flex-start;gap:10px;}
.card-icon-wrap{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;font-size:20px;flex-shrink:0;}
.card-meta{flex:1;}
.card-title{font-weight:700;font-size:15px;line-height:1.35;}
.card-subtitle{font-size:12px;color:var(--muted);margin-top:2px;font-family:'IBM Plex Mono',monospace;}
.card-body{padding:0 16px 12px;}
.card-content{font-size:13px;color:#444;line-height:1.65;margin-bottom:10px;white-space:pre-wrap;word-break:break-word;}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;}
.tag{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;}
.tag.region{background:#eef3fb;color:#2a5ba8;border:1px solid #c5d8f5;}
.tag.mode{background:#fef4ec;color:#b85c1a;border:1px solid #f7d4b8;}
.card-footer{padding:8px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--cream2);}
.card-date{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);}
.card-actions{display:flex;gap:6px;}
.btn-icon{background:none;border:none;font-size:14px;cursor:pointer;opacity:.4;transition:opacity .2s;padding:2px 4px;border-radius:4px;}
.btn-icon:hover{opacity:1;background:var(--cream2);}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,27,45,.65);z-index:200;place-items:center;backdrop-filter:blur(3px);}
.overlay.open{display:grid;}
.modal{background:#fff;border-radius:16px;width:min(620px,97vw);max-height:93vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:popIn .2s ease;}
@keyframes popIn{from{transform:scale(.93);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-head{padding:18px 24px 14px;border-bottom:1px solid var(--cream2);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:10;}
.modal-title{font-weight:700;font-size:17px;color:var(--navy);}
.btn-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);}
.modal-body{padding:20px 24px;}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--navy);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px;}
.form-hint{font-size:11px;color:var(--muted);margin-top:4px;}
.form-input,.form-textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-family:'Noto Sans KR',sans-serif;font-size:14px;color:var(--text);background:var(--cream);transition:border-color .2s,box-shadow .2s;outline:none;}
.form-input:focus,.form-textarea:focus{border-color:var(--mint2);box-shadow:0 0 0 3px rgba(62,207,178,.18);background:#fff;}
.form-textarea{resize:vertical;min-height:76px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}

/* 시간 섹션 박스 */
.time-section{border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;background:var(--cream);margin-bottom:16px;}
.time-section-title{font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;display:flex;align-items:center;gap:6px;}

/* 계층 선택 */
.hier-block{border:1.5px solid var(--border);border-radius:10px;overflow:hidden;background:var(--cream);}
.hier-major-row{display:flex;flex-wrap:wrap;gap:6px;padding:10px 12px;background:#fff;}
.hier-sub-row{display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px;min-height:42px;}
.hier-sub-row.hidden{display:none;}
.hier-hint{font-size:11px;color:var(--muted);padding:5px 12px 8px;font-style:italic;}
.check-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:13px;transition:all .15s;user-select:none;}
.check-chip input{display:none;}
.check-chip.checked{background:var(--navy);border-color:var(--navy);color:#fff;}
.check-chip.mode-chip.checked{background:var(--mint2);border-color:var(--mint2);color:var(--navy);font-weight:700;}
.major-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;color:var(--text);}
.major-btn.open{background:var(--navy);border-color:var(--navy);color:#fff;}
.major-btn.mode-btn.open{background:var(--mint2);border-color:var(--mint2);color:var(--navy);}

/* 사진 업로드 */
.photo-upload-area{border:2px dashed var(--border);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:var(--cream);}
.photo-upload-area:hover,.photo-upload-area.dragover{border-color:var(--mint2);background:rgba(62,207,178,.07);}
.photo-upload-area input{display:none;}
.upload-icon{font-size:26px;margin-bottom:4px;}
.upload-text{font-size:12px;color:var(--muted);}
.photo-preview-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.photo-preview-item{position:relative;width:76px;height:76px;}
.photo-preview-item img{width:100%;height:100%;object-fit:cover;border-radius:8px;border:1px solid var(--border);}
.photo-remove-btn{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;border:none;border-radius:50%;width:19px;height:19px;font-size:11px;cursor:pointer;display:grid;place-items:center;}

.modal-foot{padding:14px 24px;border-top:1px solid var(--cream2);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:#fff;}
.btn-cancel{background:var(--cream2);border:none;border-radius:8px;padding:9px 18px;font-family:'Noto Sans KR',sans-serif;font-size:14px;cursor:pointer;color:var(--muted);}
.btn-submit{background:var(--navy);color:#fff;border:none;border-radius:8px;padding:9px 22px;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:background .2s;}
.btn-submit:hover{background:var(--mint2);color:var(--navy);}

/* EMPTY */
.empty-state{text-align:center;padding:80px 20px;color:var(--muted);column-span:all;}
.empty-icon{font-size:52px;margin-bottom:14px;}
.empty-state h2{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:6px;}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;place-items:center;}
.lightbox.open{display:grid;}
.lightbox img{max-width:94vw;max-height:90vh;border-radius:8px;object-fit:contain;}
.lightbox-close{position:fixed;top:16px;right:20px;background:none;border:none;color:#fff;font-size:32px;cursor:pointer;}

/* CONFIRM */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(15,27,45,.7);z-index:300;place-items:center;}
.confirm-overlay.open{display:grid;}
.confirm-box{background:#fff;border-radius:14px;padding:28px 30px;width:min(360px,90vw);text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.3);}
.confirm-box h3{font-size:16px;margin-bottom:10px;}
.confirm-box p{font-size:13px;color:var(--muted);margin-bottom:22px;}
.confirm-btns{display:flex;gap:10px;justify-content:center;}
.btn-danger{background:var(--red);color:#fff;border:none;border-radius:8px;padding:9px 22px;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:14px;cursor:pointer;}

@media(max-width:520px){.form-row,.form-row-3{grid-template-columns:1fr;}.board{padding:16px 12px 60px;}.sort-bar{padding:6px 14px;}}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">🚌</div>
    <div class="logo-text">Transit<span>Log</span></div>
  </div>
  <div class="header-right">
    <div class="record-count" id="countBadge">0 기록</div>
    <button class="btn-add" onclick="openModal()">＋ 기록 추가</button>
  </div>
</header>

<!-- FILTER BAR -->
<div class="filter-bar">
  <div class="filter-section">
    <span class="filter-group-label">지역</span>
    <button class="filter-major active" data-ftype="region" data-fval="all" onclick="setFilter('region','all',this)">전체</button>
    <div class="filter-sep"></div>
    <button class="filter-major" data-ftype="region" data-fval="수도권" onclick="setFilter('region','수도권',this)">수도권</button>
    <button class="filter-minor" data-ftype="region" data-fval="서울" onclick="setFilter('region','서울',this)">서울</button>
    <button class="filter-minor" data-ftype="region" data-fval="인천" onclick="setFilter('region','인천',this)">인천</button>
    <button class="filter-minor" data-ftype="region" data-fval="경기북부" onclick="setFilter('region','경기북부',this)">경기북부</button>
    <button class="filter-minor" data-ftype="region" data-fval="경기남부" onclick="setFilter('region','경기남부',this)">경기남부</button>
    <div class="filter-sep"></div>
    <button class="filter-major" data-ftype="region" data-fval="충청권" onclick="setFilter('region','충청권',this)">충청권</button>
    <button class="filter-minor" data-ftype="region" data-fval="대전" onclick="setFilter('region','대전',this)">대전</button>
    <button class="filter-minor" data-ftype="region" data-fval="세종" onclick="setFilter('region','세종',this)">세종</button>
    <button class="filter-minor" data-ftype="region" data-fval="충북" onclick="setFilter('region','충북',this)">충북</button>
    <button class="filter-minor" data-ftype="region" data-fval="충남" onclick="setFilter('region','충남',this)">충남</button>
    <div class="filter-sep"></div>
    <button class="filter-major" data-ftype="region" data-fval="호남권" onclick="setFilter('region','호남권',this)">호남권</button>
    <button class="filter-minor" data-ftype="region" data-fval="전북" onclick="setFilter('region','전북',this)">전북</button>
    <button class="filter-minor" data-ftype="region" data-fval="전남·광주" onclick="setFilter('region','전남·광주',this)">전남·광주</button>
    <div class="filter-sep"></div>
    <button class="filter-major" data-ftype="region" data-fval="영남권" onclick="setFilter('region','영남권',this)">영남권</button>
    <button class="filter-minor" data-ftype="region" data-fval="경북" onclick="setFilter('region','경북',this)">경북</button>
    <button class="filter-minor" data-ftype="region" data-fval="경남" onclick="setFilter('region','경남',this)">경남</button>
    <button class="filter-minor" data-ftype="region" data-fval="대구" onclick="setFilter('region','대구',this)">대구</button>
    <button class="filter-minor" data-ftype="region" data-fval="울산" onclick="setFilter('region','울산',this)">울산</button>
    <button class="filter-minor" data-ftype="region" data-fval="부산" onclick="setFilter('region','부산',this)">부산</button>
    <div class="filter-sep"></div>
    <button class="filter-major" data-ftype="region" data-fval="강원권" onclick="setFilter('region','강원권',this)">강원권</button>
    <button class="filter-minor" data-ftype="region" data-fval="영서" onclick="setFilter('region','영서',this)">영서</button>
    <button class="filter-minor" data-ftype="region" data-fval="영동" onclick="setFilter('region','영동',this)">영동</button>
    <div class="filter-sep"></div>
    <button class="filter-major" data-ftype="region" data-fval="제주권" onclick="setFilter('region','제주권',this)">제주권</button>
    <button class="filter-minor" data-ftype="region" data-fval="제주" onclick="setFilter('region','제주',this)">제주</button>
    <button class="filter-minor" data-ftype="region" data-fval="서귀포" onclick="setFilter('region','서귀포',this)">서귀포</button>
  </div>
  <div class="filter-section">
    <span class="filter-group-label">수단</span>
    <button class="filter-major active" data-ftype="mode" data-fval="all" onclick="setFilter('mode','all',this)">전체</button>
    <div class="filter-sep"></div>
    <button class="filter-major" data-ftype="mode" data-fval="버스" onclick="setFilter('mode','버스',this)">🚌 버스</button>
    <button class="filter-minor" data-ftype="mode" data-fval="광역버스" onclick="setFilter('mode','광역버스',this)">광역</button>
    <button class="filter-minor" data-ftype="mode" data-fval="급행버스" onclick="setFilter('mode','급행버스',this)">급행</button>
    <button class="filter-minor" data-ftype="mode" data-fval="간선버스" onclick="setFilter('mode','간선버스',this)">간선</button>
    <button class="filter-minor" data-ftype="mode" data-fval="지선버스" onclick="setFilter('mode','지선버스',this)">지선</button>
    <button class="filter-minor" data-ftype="mode" data-fval="마을버스" onclick="setFilter('mode','마을버스',this)">마을</button>
    <div class="filter-sep"></div>
    <button class="filter-major" data-ftype="mode" data-fval="지하철" onclick="setFilter('mode','지하철',this)">🚇 지하철</button>
    <div class="filter-sep"></div>
    <button class="filter-major" data-ftype="mode" data-fval="고속철도" onclick="setFilter('mode','고속철도',this)">🚄 고속철도</button>
    <button class="filter-minor" data-ftype="mode" data-fval="KTX" onclick="setFilter('mode','KTX',this)">KTX</button>
    <button class="filter-minor" data-ftype="mode" data-fval="KTX 산천" onclick="setFilter('mode','KTX 산천',this)">산천</button>
    <button class="filter-minor" data-ftype="mode" data-fval="KTX 이음" onclick="setFilter('mode','KTX 이음',this)">이음</button>
    <button class="filter-minor" data-ftype="mode" data-fval="KTX 청룡" onclick="setFilter('mode','KTX 청룡',this)">청룡</button>
    <button class="filter-minor" data-ftype="mode" data-fval="SRT" onclick="setFilter('mode','SRT',this)">SRT</button>
    <div class="filter-sep"></div>
    <button class="filter-major" data-ftype="mode" data-fval="일반철도" onclick="setFilter('mode','일반철도',this)">🚆 일반철도</button>
    <button class="filter-minor" data-ftype="mode" data-fval="무궁화" onclick="setFilter('mode','무궁화',this)">무궁화</button>
    <button class="filter-minor" data-ftype="mode" data-fval="새마을" onclick="setFilter('mode','새마을',this)">새마을</button>
    <button class="filter-minor" data-ftype="mode" data-fval="마음" onclick="setFilter('mode','마음',this)">마음</button>
    <button class="filter-minor" data-ftype="mode" data-fval="청춘" onclick="setFilter('mode','청춘',this)">청춘</button>
  </div>
</div>

<!-- SORT BAR -->
<div class="sort-bar">
  <span class="sort-label">정렬</span>
  <button class="sort-btn active" data-sort="datetime-desc" onclick="setSort('datetime-desc',this)">🕐 최신순</button>

<script>
// ── 상수 ──────────────────────────────────────────
const STORAGE_KEY = 'transitLog_v3';

const REGION_GROUPS = {
  '수도권':['서울','인천','경기북부','경기남부'],
  '충청권':['대전','세종','충북','충남'],
  '호남권':['전북','전남·광주'],
  '영남권':['경북','경남','대구','울산','부산'],
  '강원권':['영서','영동'],
  '제주권':['제주','서귀포'],
};
const MODE_GROUPS = {
  '버스':    ['광역버스','급행버스','간선버스','지선버스','마을버스'],
  '지하철':  ['지하철'],
  '고속철도':['KTX','KTX 산천','KTX 이음','KTX 청룡','SRT'],
  '일반철도':['무궁화','새마을','마음','청춘'],
};
const MODE_META = {
  '광역버스':{icon:'🚌',bar:'#4a90d9',bg:'#eef3fb'},
  '급행버스':{icon:'🚌',bar:'#2563eb',bg:'#dbeafe'},
  '간선버스':{icon:'🚌',bar:'#3b82f6',bg:'#eff6ff'},
  '지선버스':{icon:'🚌',bar:'#60a5fa',bg:'#f0f7ff'},
  '마을버스':{icon:'🚌',bar:'#93c5fd',bg:'#f8fbff'},
  '지하철':  {icon:'🚇',bar:'#e8503a',bg:'#fef0ee'},
  'KTX':     {icon:'🚄',bar:'#f0c040',bg:'#fef9ec'},
  'KTX 산천':{icon:'🚄',bar:'#e6b800',bg:'#fef7e0'},
  'KTX 이음':{icon:'🚄',bar:'#d97706',bg:'#fef3c7'},
  'KTX 청룡':{icon:'🚄',bar:'#0ea5e9',bg:'#e0f2fe'},
  'SRT':     {icon:'🚄',bar:'#b45309',bg:'#fef3e8'},
  '무궁화':  {icon:'🚆',bar:'#5ab870',bg:'#eef8f0'},
  '새마을':  {icon:'🚆',bar:'#16a34a',bg:'#dcfce7'},
  '마음':    {icon:'🚆',bar:'#22c55e',bg:'#f0fdf4'},
  '청춘':    {icon:'🚆',bar:'#86efac',bg:'#f7fff9'},
};
function getMeta(modes){
  if(!modes||!modes.length) return{icon:'🎫',bar:'#9ca3af',bg:'#f3f4f6'};
  return MODE_META[modes[0]]||{icon:'🚌',bar:'#9ca3af',bg:'#f3f4f6'};
}

// ── 상태 ──────────────────────────────────────────
let records      = JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
let filters      = {region:'all',mode:'all'};
let currentSort  = 'datetime-desc';
let deleteTarget = null;
let editTarget   = null;
let pendingPhotos= [];

// ── 저장 ──────────────────────────────────────────
function save(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(records)); }

// ── 날짜+시간 → 정렬 가능한 숫자 변환 ────────────────
function toSortKey(date, time){
  // date: "YYYY-MM-DD", time: "HH:MM" (없으면 "")
  const d = date || '0000-00-00';
  const t = time || '00:00';
  return d.replace(/-/g,'') + t.replace(':','');
}
// 탑승 시간(분) 계산
function calcDuration(boardTime, alightTime){
  if(!boardTime||!alightTime) return null;
  const [bh,bm] = boardTime.split(':').map(Number);
  const [ah,am] = alightTime.split(':').map(Number);
  let diff = (ah*60+am) - (bh*60+bm);
  if(diff < 0) diff += 24*60; // 자정 넘기는 경우
  return diff;
}
function fmtDuration(min){
  if(min===null) return null;
  if(min < 60) return `${min}분`;
  return `${Math.floor(min/60)}시간 ${min%60>0?min%60+'분':''}`.trim();
}

// ── 필터 매칭 ─────────────────────────────────────
function matchFilter(r){
  let regionOk = filters.region==='all';
  if(!regionOk){
    const subs=REGION_GROUPS[filters.region];
    regionOk = subs ? (r.regions||[]).some(v=>subs.includes(v))
                    : (r.regions||[]).includes(filters.region);
  }
  let modeOk = filters.mode==='all';
  if(!modeOk){
    const subs=MODE_GROUPS[filters.mode];
    modeOk = subs ? (r.modes||[]).some(v=>subs.includes(v))
                  : (r.modes||[]).includes(filters.mode);
  }
  return regionOk && modeOk;
}

// ── 정렬 ──────────────────────────────────────────
function sortRecords(list){
  return list.slice().sort((a,b)=>{
    if(currentSort==='datetime-asc'){
      return toSortKey(a.date,a.boardTime).localeCompare(toSortKey(b.date,b.boardTime));
    }
    if(currentSort==='datetime-desc'){
      return toSortKey(b.date,b.boardTime).localeCompare(toSortKey(a.date,a.boardTime));
    }
    const da = calcDuration(a.boardTime,a.alightTime)??-1;
    const db = calcDuration(b.boardTime,b.alightTime)??-1;
    if(currentSort==='duration-desc') return db-da;
    if(currentSort==='duration-asc')  return da-db;
    return 0;
  });
}

// ── 렌더 ──────────────────────────────────────────
function render(){
  const board = document.getElementById('board');
  const list  = sortRecords(records.filter(matchFilter));
  document.getElementById('countBadge').textContent = records.length+' 기록';

  if(!list.length){
    board.innerHTML=`<div class="empty-state">
      <div class="empty-icon">🎫</div>
      <h2>${records.length===0?'첫 탑승 기록을 남겨보세요!':'해당 조건의 기록이 없어요'}</h2>
      <p>${records.length===0?'우측 상단 버튼을 눌러 시작하세요.':'다른 필터를 선택해보세요.'}</p>
    </div>`;
    return;
  }

  board.innerHTML = list.map(r=>{
    const meta    = getMeta(r.modes);
    const regions = (r.regions||[]).map(v=>`<span class="tag region">${esc(v)}</span>`).join('');
    const modes   = (r.modes||[]).map(v=>`<span class="tag mode">${getMeta([v]).icon} ${esc(v)}</span>`).join('');
    const photos  = r.photos||[];
    const dur     = calcDuration(r.boardTime,r.alightTime);

    // 사진
    let photosHtml='';
    if(photos.length){
      const cls=photos.length===1?'card-photos single':'card-photos';
      photosHtml=`<div class="${cls}">${photos.map((p,i)=>
        `<img src="${p}" loading="lazy" onclick="openLightbox('${esc(r.id)}',${i})" alt="사진"/>`).join('')}</div>`;
    }

    // 타임라인 바
    let timeHtml='';
    if(r.boardTime||r.alightTime){
      const durTxt = dur!==null?`<span class="time-dur">⏱ ${fmtDuration(dur)}</span>`:'';
      timeHtml=`<div class="time-bar">
        <div class="time-dot s"></div>
        <span class="time-val s">${r.boardTime||'?'}</span>
        ${durTxt}
        <div class="time-line"></div>
        <span class="time-val e">${r.alightTime||'?'}</span>
        <div class="time-dot e"></div>
      </div>`;
    }

    // 구간 번호
    let segHtml='';
    if(r.segFrom||r.segTo){
      segHtml=`<div class="segment-row">
        ${r.segFrom?`<span class="seg-tag">${esc(r.segFrom)}</span>`:''}
        ${r.segFrom&&r.segTo?`<span class="seg-arr">→</span>`:''}
        ${r.segTo?`<span class="seg-tag">${esc(r.segTo)}</span>`:''}
      </div>`;
    }

    return `<article class="card" data-id="${esc(r.id)}">
      <div class="card-bar" style="background:${meta.bar}"></div>
      ${photosHtml}
      ${timeHtml}
      ${segHtml}
      <div class="card-header">
        <div class="card-icon-wrap" style="background:${meta.bg}">${meta.icon}</div>
        <div class="card-meta">
          <div class="card-title">${esc(r.from||'')}${r.from&&r.to?' → ':''}${esc(r.to||'')}</div>
          ${r.route?`<div class="card-subtitle">${esc(r.route)}</div>`:''}
        </div>
      </div>
      <div class="card-body">
        ${r.memo?`<div class="card-content">${esc(r.memo)}</div>`:''}
        <div class="tag-row">${modes}${regions}</div>
      </div>
      <div class="card-footer">
        <div class="card-date">${r.date||''}</div>
        <div class="card-actions">
          <button class="btn-icon" title="수정"  onclick="editRecord('${esc(r.id)}')">✏️</button>
          <button class="btn-icon" title="삭제" onclick="askDelete('${esc(r.id)}')">🗑</button>
        </div>
      </div>
    </article>`;
  }).join('');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── FILTER / SORT ─────────────────────────────────
function setFilter(type,value,btn){
  filters[type]=value;
  document.querySelectorAll(`[data-ftype="${type}"]`).forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setSort(key,btn){
  currentSort=key;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── 계층 토글 ─────────────────────────────────────
function toggleGroup(grp,btn){
  const row=document.getElementById('grp-'+grp);
  const open=!row.classList.contains('hidden');
  ['bus','sub','hsr','rail'].forEach(g=>{
    document.getElementById('grp-'+g).classList.add('hidden');
    document.querySelector(`[data-group="${g}"]`).classList.remove('open');
  });
  if(!open){row.classList.remove('hidden');btn.classList.add('open');}
}
function toggleRGroup(grp,btn){
  const row=document.getElementById('rgrp-'+grp);
  const open=!row.classList.contains('hidden');
  ['rsudo','rchung','rhonam','ryeong','rgang','rjeju'].forEach(g=>{
    document.getElementById('rgrp-'+g).classList.add('hidden');
    document.querySelector(`[data-rgroup="${g}"]`).classList.remove('open');
  });
  if(!open){row.classList.remove('hidden');btn.classList.add('open');}
}

// ── MODAL ────────────────────────────────────────
function openModal(prefill){
  editTarget   = prefill?prefill.id:null;
  pendingPhotos= prefill?[...(prefill.photos||[])]:[];
  document.getElementById('modalTitle').textContent = prefill?'✏️ 기록 수정':'🎫 새 탑승 기록';
  document.getElementById('fDate').value       = prefill?prefill.date:today();
  document.getElementById('fRoute').value      = prefill?(prefill.route||''):'';
  document.getElementById('fBoardTime').value  = prefill?(prefill.boardTime||''):'';
  document.getElementById('fAlightTime').value = prefill?(prefill.alightTime||''):'';
  document.getElementById('fFrom').value       = prefill?(prefill.from||''):'';
  document.getElementById('fTo').value         = prefill?(prefill.to||''):'';
  document.getElementById('fSegFrom').value    = prefill?(prefill.segFrom||''):'';
  document.getElementById('fSegTo').value      = prefill?(prefill.segTo||''):'';
  document.getElementById('fMemo').value       = prefill?(prefill.memo||''):'';

  document.querySelectorAll('#grp-bus input,#grp-sub input,#grp-hsr input,#grp-rail input').forEach(cb=>{
    cb.checked=prefill?(prefill.modes||[]).includes(cb.value):false;
    cb.closest('.check-chip').classList.toggle('checked',cb.checked);
  });
  document.querySelectorAll('[id^="rgrp-"] input').forEach(cb=>{
    cb.checked=prefill?(prefill.regions||[]).includes(cb.value):false;
    cb.closest('.check-chip').classList.toggle('checked',cb.checked);
  });
  document.querySelectorAll('.hier-sub-row').forEach(r=>r.classList.add('hidden'));
  document.querySelectorAll('.major-btn').forEach(b=>b.classList.remove('open'));

  renderPhotoPreview();
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){document.getElementById('overlay').classList.remove('open');editTarget=null;pendingPhotos=[];}
function closeOnBg(e){if(e.target===document.getElementById('overlay'))closeModal();}

function submitRecord(){
  const modes  =[...document.querySelectorAll('#grp-bus input:checked,#grp-sub input:checked,#grp-hsr input:checked,#grp-rail input:checked')].map(c=>c.value);
  const regions=[...document.querySelectorAll('[id^="rgrp-"] input:checked')].map(c=>c.value);
  const from   =document.getElementById('fFrom').value.trim();
  const to     =document.getElementById('fTo').value.trim();
  if(!from&&!to&&!modes.length){alert('출발지 또는 도착지, 교통 수단을 하나 이상 입력해 주세요.');return;}

  const rec={
    date:      document.getElementById('fDate').value,
    route:     document.getElementById('fRoute').value.trim(),
    boardTime: document.getElementById('fBoardTime').value,
    alightTime:document.getElementById('fAlightTime').value,
    from, to,
    segFrom:   document.getElementById('fSegFrom').value.trim(),
    segTo:     document.getElementById('fSegTo').value.trim(),
    modes, regions,
    memo:      document.getElementById('fMemo').value.trim(),
    photos:    [...pendingPhotos],
  };
  if(editTarget){
    const idx=records.findIndex(r=>r.id===editTarget);
    if(idx!==-1) records[idx]={...records[idx],...rec};
  } else {
    records.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),...rec});
  }
  save();closeModal();render();
}

// ── 사진 ──────────────────────────────────────────
function addPhotos(files){
  const rem=10-pendingPhotos.length;
  const cnt=Math.min(files.length,rem);
  let done=0;
  for(let i=0;i<cnt;i++){
    const rd=new FileReader();
    rd.onload=e=>{pendingPhotos.push(e.target.result);done++;if(done===cnt)renderPhotoPreview();};
    rd.readAsDataURL(files[i]);
  }
  document.getElementById('fPhotos').value='';
}
function removePhoto(i){pendingPhotos.splice(i,1);renderPhotoPreview();}
function renderPhotoPreview(){
  document.getElementById('photoPreviewGrid').innerHTML=pendingPhotos.map((p,i)=>`
    <div class="photo-preview-item">
      <img src="${p}" alt="미리보기"/>
      <button class="photo-remove-btn" onclick="removePhoto(${i})">✕</button>
    </div>`).join('');
}
function dragOver(e){e.preventDefault();document.getElementById('uploadArea').classList.add('dragover');}
function dragLeave(){document.getElementById('uploadArea').classList.remove('dragover');}
function dropFiles(e){e.preventDefault();document.getElementById('uploadArea').classList.remove('dragover');addPhotos(e.dataTransfer.files);}

// ── LIGHTBOX ──────────────────────────────────────
function openLightbox(id,idx){
  const r=records.find(r=>r.id===id);
  if(!r||!r.photos) return;
  document.getElementById('lightboxImg').src=r.photos[idx];
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}

// ── EDIT / DELETE ─────────────────────────────────
function editRecord(id){const r=records.find(r=>r.id===id);if(r)openModal(r);}
function askDelete(id){deleteTarget=id;document.getElementById('confirmOverlay').classList.add('open');}
function closeConfirm(){deleteTarget=null;document.getElementById('confirmOverlay').classList.remove('open');}
function confirmDelete(){records=records.filter(r=>r.id!==deleteTarget);save();closeConfirm();render();}

// ── 유틸 ──────────────────────────────────────────
function today(){return new Date().toISOString().slice(0,10);}
document.addEventListener('change',e=>{
  if(e.target.type==='checkbox'&&e.target.closest('.check-chip'))
    e.target.closest('.check-chip').classList.toggle('checked',e.target.checked);
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeConfirm();closeLightbox();}
});

render();
</script>
</body>
</html>
